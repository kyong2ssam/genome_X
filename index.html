<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>생명공학 연구소 방탈출: GENOME-X</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: rgba(0, 30, 10, 0.90);
            --color-green: #00ff41;
            --color-red: #ff2222;
            --color-blue: #00ccff;
            --color-amber: #ffaa00;
            --text-main: #ccffcc;
            --text-dim: #557755;
            --border: #00aa22;
            --font-main: 'Noto Sans KR', sans-serif;
            --font-mono: 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* [수정 3] 모바일에서 스크롤 방지 및 화면 고정 */
        html, body {
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            position: fixed; /* 바운스 방지 */
        }

        .dna-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 20%, var(--bg-dark) 100%),
                        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 65, 0.03) 3px, rgba(0, 255, 65, 0.03) 3px);
            z-index: -2;
        }

        button {
            background: #000; color: var(--color-green); border: 1px solid var(--border);
            padding: 8px 16px; font-family: var(--font-mono); font-size: 0.9rem;
            cursor: pointer; transition: all 0.2s; border-radius: 3px;
        }
        button:hover:not(:disabled) { background: var(--color-green); color: #000; }

        .panel {
            background: var(--bg-panel); border: 1px solid var(--border);
            box-shadow: 0 0 10px rgba(0, 170, 34, 0.3); padding: 15px; border-radius: 5px; backdrop-filter: blur(5px);
        }

        /* 스크린 레이아웃 최적화 */
        .screen {
            display: none; width: 100%; height: 100%; padding: 10px;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .screen.active { display: flex; }

        #status-bar {
            display: none; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.9); border-bottom: 1px solid var(--border);
            padding: 5px 15px; font-family: var(--font-mono); font-size: 0.8rem;
            width: 100%; z-index: 100;
        }

        #intro-text { font-family: var(--font-mono); font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; text-align: left; width: 100%; max-width: 500px; min-height: 180px; }

        .map-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 500px; }
        .map-node { width: 60px; height: 60px; border: 2px solid var(--text-dim); border-radius: 8px; display: flex; justify-content: center; align-items: center; background: #000; font-size: 0.9rem; position: relative; }
        .map-node.current { border-color: var(--color-amber); color: var(--color-amber); animation: pulseAmber 2s infinite; cursor: pointer; }
        .map-node.cleared { border-color: var(--color-green); color: var(--color-green); }

        #stage-screen { display: none; flex-direction: column; gap: 10px; height: calc(100dvh - 40px); justify-content: start; padding-top: 10px; }
        #stage-screen.active { display: flex; }

        .story-panel { width: 100%; font-size: 0.9rem; line-height: 1.4; flex-shrink: 0; }
        .game-area { width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; overflow: hidden; }
        .tools-area { width: 100%; display: flex; flex-direction: row; gap: 8px; flex-shrink: 0; }

        .sequence-container { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .codon-card { background: rgba(0,0,0,0.8); border: 1px solid var(--color-blue); padding: 5px; border-radius: 4px; text-align: center; font-family: var(--font-mono); font-size: 0.9rem; min-width: 45px; color: var(--color-blue); }
        .codon-card.dna { border-color: var(--color-amber); color: var(--color-amber); }

        .input-group { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
        .char-input {
            width: 32px; height: 42px; background: #000; border: 1px solid var(--border); color: var(--color-green);
            font-size: 1.2rem; text-align: center; border-radius: 3px; outline: none;
        }
        /* [수정 1] 오답 시 빨간색 표기 */
        .char-input.error-input {
            border-color: var(--color-red) !important;
            background: rgba(255, 0, 0, 0.2);
            box-shadow: 0 0 5px var(--color-red);
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .popup { background: var(--bg-panel); border: 2px solid var(--border); padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }

        @keyframes pulseAmber { 0% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 170, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0); } }
    </style>
</head>
<body>
    <div class="dna-bg"></div>
    
    <div id="status-bar">
        <div id="timer">⏱ 00:00</div>
        <div id="score-display" style="color: var(--color-amber);">💯 200</div>
        <button onclick="showScreen('map-screen')" style="padding: 2px 8px; font-size: 0.7rem;">🗺 지도</button>
    </div>

    <div id="intro-screen" class="screen active" onclick="skipIntro()">
        <div class="panel" style="width: 90%;">
            <h2 style="color: var(--color-red); font-size: 1.2rem; margin-bottom: 10px;">TERMINAL ACCESS</h2>
            <div id="intro-text" class="typing-cursor"></div>
            <button id="btn-start" onclick="event.stopPropagation(); startGame();" style="display: none; width: 100%;">시스템 접속</button>
        </div>
    </div>

    <div id="map-screen" class="screen">
        <div class="panel" style="text-align: center; width: 95%;">
            <h3 style="margin-bottom: 10px;">연구소 평면도</h3>
            <div class="map-grid" id="map-grid"></div>
        </div>
    </div>

    <div id="stage-screen" class="screen">
        <div class="panel story-panel">
            <h4 id="st-title" style="color: var(--color-amber); margin-bottom: 5px;"></h4>
            <p id="st-desc"></p>
        </div>

        <div class="panel game-area">
            <div id="game-content" style="width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center;">
                <div id="transcription-area" style="display: none; width: 100%; text-align: center;">
                    <div id="dna-sequence" class="sequence-container"></div>
                    <div style="margin: 5px 0; font-size: 0.7rem; color: var(--text-dim);">⬇ TRANSCRIPTION ⬇</div>
                    <div id="rna-input-group" class="input-group"></div>
                    <button onclick="checkTranscription()" style="margin-top: 8px;">전사 완료</button>
                </div>
                <div id="translation-area" style="display: none; width: 100%; text-align: center;">
                    <div id="rna-sequence" class="sequence-container"></div>
                    <div style="margin: 5px 0; font-size: 0.7rem; color: var(--text-dim);">⬇ TRANSLATION ⬇</div>
                    <div id="answer-input-group" class="input-group"></div>
                    <button onclick="checkTranslation()" style="margin-top: 8px;">해독 완료</button>
                </div>
            </div>
        </div>

        <div class="tools-area">
            <button onclick="showCodonTable()" style="flex: 1;">📋 코돈표</button>
            <button onclick="useHint()" style="flex: 1;">💡 힌트</button>
        </div>
        <div id="hint-display" style="color: var(--color-amber); font-size: 0.8rem; text-align: center; height: 20px;"></div>
    </div>

    <div id="ending-screen" class="screen">
        <div class="panel" style="text-align: center; width: 90%;">
            <h2 style="color: var(--color-green); margin-bottom: 15px;">MISSION CLEAR</h2>
            <div id="score-summary" style="margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6;"></div>
            <input type="text" id="player-name" placeholder="이름 입력" style="padding: 10px; width: 100%; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid var(--border);">
            <button onclick="submitScore()" id="btn-submit" style="width: 100%;">랭킹 등록</button>
            <div id="rank-display" style="margin-top: 15px; font-size: 0.8rem; max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="popup-overlay" class="overlay" onclick="closePopup()">
        <div class="popup" onclick="event.stopPropagation()">
            <h3 id="popup-title" style="margin-bottom: 10px;"></h3>
            <div id="popup-content" style="font-size: 0.85rem; max-height: 60dvh; overflow-y: auto;"></div>
            <button onclick="closePopup()" style="margin-top: 15px; width: 100%;">닫기</button>
        </div>
    </div>

<script>
// [수정 4] SCRIPT_URL 안정성 강화
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUCQ678-9Up6ap_gD0bHypxCLxy8S2TnUCld3I1w198Z4LEqPfQoMHX9-eXnTedq91yw/exec";

const STAGES = [
    { title: "입구 보안실", desc: "금고의 RNA 서열을 해독하세요.", ans: "GENE", dna: null, lang: 'EN' },
    { title: "중앙 복도", desc: "DNA를 RNA로 전사한 후 해독하세요.", ans: "OPEN", dna: "TACCGGTTA", lang: 'EN' },
    // ... 추가 스테이지 데이터
];

const CODON_EN = { "AUG":"D", "UAC":"A", "GGC":"C", "AAU":"K", "GENE":"GENE" }; // 단순화된 예시

let state = { stage: 0, score: 200, time: 0, timer: null, hints: 0 };

function startGame() {
    state.timer = setInterval(() => { state.time++; updateStatusBar(); }, 1000);
    showScreen('map-screen');
    renderMap();
}

function updateStatusBar() {
    document.getElementById('timer').innerText = `⏱ ${Math.floor(state.time/60).toString().padStart(2,'0')}:${(state.time%60).toString().padStart(2,'0')}`;
    document.getElementById('score-display').innerText = `💯 ${state.score}`;
}

function renderMap() {
    const grid = document.getElementById('map-grid');
    grid.innerHTML = '';
    STAGES.forEach((s, i) => {
        const node = document.createElement('div');
        node.className = `map-node ${i <= state.stage ? 'current' : 'locked'}`;
        node.innerText = i + 1;
        if(i <= state.stage) node.onclick = () => loadStage(i);
        grid.appendChild(node);
    });
}

function loadStage(idx) {
    const s = STAGES[idx];
    document.getElementById('st-title').innerText = s.title;
    document.getElementById('st-desc').innerText = s.desc;
    
    const transArea = document.getElementById('transcription-area');
    const translArea = document.getElementById('translation-area');
    
    if(s.dna) {
        transArea.style.display = 'block';
        translArea.style.display = 'none';
        renderDNA(s.dna);
    } else {
        transArea.style.display = 'none';
        translArea.style.display = 'block';
        renderRNA(s.ans);
    }
    showScreen('stage-screen');
}

// [수정 1] 오답 시 칸 빨간색 표기 로직 적용
function checkTranslation() {
    const inputs = document.querySelectorAll('#answer-input-group .char-input');
    const ans = STAGES[state.stage].ans;
    let correct = true;

    inputs.forEach((input, i) => {
        if(input.value.toUpperCase() === ans[i]) {
            input.classList.remove('error-input');
        } else {
            input.classList.add('error-input');
            correct = false;
        }
    });

    if(correct) {
        alert("성공!");
        state.stage++;
        if(state.stage >= STAGES.length) showEnding();
        else renderMap();
    } else {
        state.score -= 10;
        updateStatusBar();
    }
}

// [수정 4] GAS 전송 안정성 강화 (GET 방식 사용)
async function submitScore() {
    const name = document.getElementById('player-name').value;
    if(!name) return alert("이름을 입력하세요.");
    
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerText = "전송 중...";

    try {
        const url = `${SCRIPT_URL}?action=add&name=${encodeURIComponent(name)}&score=${state.score}&time=${state.time}`;
        // GAS는 리다이렉트되므로 mode: 'no-cors'가 아닌 일반 fetch 후 에러 핸들링
        await fetch(url, { method: 'GET', mode: 'no-cors' });
        
        alert("등록 요청 완료! (보안 정책에 따라 즉시 갱신되지 않을 수 있습니다)");
        loadRanking();
    } catch(e) {
        console.error(e);
        alert("연결 오류가 발생했습니다.");
        btn.disabled = false;
        btn.innerText = "랭킹 등록";
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('status-bar').style.display = (id === 'intro-screen') ? 'none' : 'flex';
}

function closePopup() { document.getElementById('popup-overlay').style.display = 'none'; }

// [수정 2] 한글 키보드 함수(initKeyboard) 삭제됨
// [수정 3] 뷰포트 높이 계산 보정
function setViewportHeight() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}
window.addEventListener('resize', setViewportHeight);
setViewportHeight();

// 인트로 관련
function typeIntro() { /* 기존 타이핑 로직 */ }
function skipIntro() { /* 건너뛰기 */ document.getElementById('btn-start').style.display = 'block'; }
</script>
</body>
</html>
